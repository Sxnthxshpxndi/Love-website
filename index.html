<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>A Little Something For You 💌</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400;1,600&family=Dancing+Script:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --rose: #f9a8c9;
        --rose-deep: #e0608a;
        --blush: #fff0f5;
        --petal: #ffe4ef;
        --cream: #fffaf8;
        --ink: #5a2a3a;
        --muted: #b07090;
      }

      html,
      body {
        height: 100%;
        font-family: "Lora", serif;
        background: var(--blush);
        color: var(--ink);
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
      }

      .page {
        display: none;
        min-height: 100vh;
        min-height: 100dvh;
      }
      .page.active {
        display: flex;
      }

      /* ── PAGE 1 ── */
      #page1 {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        background: linear-gradient(
          135deg,
          #ffe4ef 0%,
          #ffd6e8 40%,
          #ffecf4 100%
        );
        overflow: hidden;
        padding: 2rem 1rem;
      }

      #heartCanvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .p1-card {
        position: relative;
        z-index: 2;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1.5px solid rgba(249, 168, 201, 0.6);
        border-radius: 32px;
        padding: 3rem 2.5rem;
        text-align: center;
        box-shadow:
          0 20px 60px rgba(224, 96, 138, 0.18),
          0 2px 8px rgba(0, 0, 0, 0.04);
        animation: fadeUp 1s ease both;
        max-width: 460px;
        width: 100%;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(36px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .deco-hearts {
        font-size: clamp(1.4rem, 5vw, 2rem);
        letter-spacing: 0.5rem;
        margin-bottom: 1rem;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.12);
        }
      }

      .p1-question {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.8rem, 6vw, 3rem);
        font-style: italic;
        color: var(--rose-deep);
        line-height: 1.2;
        margin-bottom: 0.6rem;
      }

      .p1-sub {
        font-size: clamp(0.82rem, 3vw, 0.95rem);
        color: var(--muted);
        margin-bottom: 2rem;
        font-style: italic;
      }

      @keyframes yesShake {
        0%,
        100% {
          transform: scale(1.07) rotate(0deg);
        }
        25% {
          transform: scale(1.1) rotate(-4deg);
        }
        75% {
          transform: scale(1.1) rotate(4deg);
        }
      }

      .btn-row {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
        align-items: center;
      }

      .btn {
        font-family: "Dancing Script", cursive;
        font-size: clamp(1rem, 3.5vw, 1.25rem);
        font-weight: 700;
        padding: 0.75rem 2rem;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      .btn-yes {
        background: linear-gradient(135deg, #f472b6, #e0608a);
        color: #fff;
        box-shadow: 0 6px 22px rgba(224, 96, 138, 0.4);
      }
      .btn-yes:hover,
      .btn-yes:active {
        transform: scale(1.07);
        box-shadow: 0 10px 30px rgba(224, 96, 138, 0.55);
      }

      .btn-no {
        background: #fff0f5;
        color: var(--rose-deep);
        border: 1.5px solid var(--rose);
        transition:
          font-size 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          padding 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.3s ease;
      }
      .btn-no:hover {
        background: #ffe4ef;
        border-color: var(--rose-deep);
      }

      /* ── PAGE 2 ── */
      #page2 {
        flex-direction: column;
        align-items: center;
        padding: 3rem 1.2rem 5rem;
        background: linear-gradient(
          160deg,
          #fff0f5 0%,
          #ffe8f2 60%,
          #fff4f8 100%
        );
        min-height: 100vh;
        min-height: 100dvh;
      }

      .p2-header {
        text-align: center;
        margin-bottom: 2.5rem;
        animation: fadeUp 0.8s ease both;
        padding: 0 1rem;
      }
      .p2-header h1 {
        font-family: "Dancing Script", cursive;
        font-size: clamp(2rem, 8vw, 3.8rem);
        color: var(--rose-deep);
        line-height: 1.1;
      }
      .p2-header p {
        font-size: clamp(0.82rem, 3vw, 0.95rem);
        color: var(--muted);
        margin-top: 0.5rem;
        font-style: italic;
      }

      .folder-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.5rem;
        max-width: 900px;
        width: 100%;
      }

      @media (min-width: 768px) {
        .folder-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      .folder {
        cursor: pointer;
        animation: fadeUp 0.8s ease both;
        -webkit-tap-highlight-color: transparent;
      }
      .folder:nth-child(2) {
        animation-delay: 0.15s;
      }
      .folder:nth-child(3) {
        animation-delay: 0.3s;
      }

      .folder-tab {
        background: linear-gradient(135deg, #f9c0d8, #f472b6);
        height: 22px;
        width: 45%;
        border-radius: 8px 8px 0 0;
        margin-left: 16px;
        box-shadow: 0 -2px 6px rgba(224, 96, 138, 0.15);
      }

      .folder-body {
        background: linear-gradient(160deg, #fff8fb, #ffe9f3);
        border: 1.5px solid rgba(249, 168, 201, 0.7);
        border-radius: 0 12px 12px 12px;
        padding: 1.4rem 1.3rem 1.2rem;
        box-shadow: 0 8px 30px rgba(224, 96, 138, 0.12);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .folder:hover .folder-body,
      .folder:active .folder-body {
        transform: translateY(-6px);
        box-shadow: 0 18px 45px rgba(224, 96, 138, 0.22);
      }

      .folder-label {
        font-family: "Dancing Script", cursive;
        font-size: clamp(1.3rem, 4vw, 1.6rem);
        color: var(--rose-deep);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.4rem;
      }

      .folder-hint {
        font-size: clamp(0.75rem, 2.5vw, 0.82rem);
        color: var(--muted);
        font-style: italic;
      }

      /* ── MODAL ── */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(90, 42, 58, 0.45);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 900;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        animation: fadeIn 0.3s ease;
        overflow-y: auto;
      }
      .overlay.open {
        display: flex;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .letter-modal {
        background: var(--cream);
        border-radius: 24px;
        max-width: 600px;
        width: 100%;
        max-height: 90vh;
        max-height: 90dvh;
        overflow-y: auto;
        padding: 2.5rem 2rem 2rem;
        position: relative;
        box-shadow: 0 30px 80px rgba(90, 42, 58, 0.3);
        animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        border: 1.5px solid rgba(249, 168, 201, 0.5);
        margin: auto;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(60px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .modal-close {
        position: absolute;
        top: 1rem;
        right: 1.2rem;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--muted);
        line-height: 1;
        transition:
          color 0.2s,
          transform 0.2s;
        padding: 0.3rem;
        -webkit-tap-highlight-color: transparent;
      }
      .modal-close:hover {
        color: var(--rose-deep);
        transform: scale(1.2);
      }

      .modal-title {
        font-family: "Dancing Script", cursive;
        font-size: clamp(1.6rem, 5vw, 2.1rem);
        color: var(--rose-deep);
        margin-bottom: 0.3rem;
        text-align: center;
        padding-right: 2rem;
      }

      .modal-divider {
        text-align: center;
        font-size: 1.1rem;
        letter-spacing: 0.5rem;
        color: var(--rose);
        margin-bottom: 1.5rem;
      }

      .img-grid {
        display: flex;
        justify-content: center;
        margin-bottom: 1.5rem;
      }

      .img-placeholder {
        width: 100%;
        max-width: 420px;
        aspect-ratio: 4/3;
        border: 2px dashed var(--rose);
        border-radius: 16px;
        background: var(--petal);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        color: var(--muted);
        font-size: 0.85rem;
        text-align: center;
        overflow: hidden;
        position: relative;
      }
      .img-placeholder span.icon {
        font-size: 2.5rem;
      }
      .img-placeholder img.preview {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 14px;
      }

      .msg-area {
        width: 100%;
        min-height: 120px;
        background: var(--petal);
        border: 1.5px solid var(--rose);
        border-radius: 14px;
        padding: 1rem 1.2rem;
        font-family: "Lora", serif;
        font-size: clamp(0.85rem, 3vw, 0.95rem);
        color: var(--ink);
        line-height: 1.9;
        white-space: pre-wrap;
        user-select: none;
        -webkit-user-select: none;
      }

      .stamp-row {
        display: flex;
        justify-content: flex-end;
        gap: 0.6rem;
        margin-top: 1.2rem;
        font-size: 1.4rem;
        opacity: 0.6;
      }

      .letter-modal::-webkit-scrollbar {
        width: 6px;
      }
      .letter-modal::-webkit-scrollbar-thumb {
        background: var(--rose);
        border-radius: 99px;
      }

      .home-bar {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 2.5rem 0 1rem;
      }

      @media (max-width: 480px) {
        .p1-card {
          padding: 2rem 1.4rem;
          border-radius: 24px;
        }
        .letter-modal {
          padding: 2rem 1.2rem 1.6rem;
          border-radius: 18px;
        }
        .folder-grid {
          grid-template-columns: 1fr;
        }
        .btn {
          padding: 0.7rem 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- PAGE 1 -->
    <div class="page active" id="page1">
      <canvas id="heartCanvas"></canvas>
      <div class="p1-card">
        <div class="deco-hearts">🌸 💕 🌸</div>
        <h1 class="p1-question">Do you love me?</h1>
        <p class="p1-sub">take your time, i'll wait… 🥹🌷</p>
        <div class="btn-row">
          <button class="btn btn-yes" id="btnYes" onclick="goToPage2()">
            Yes ❤️
          </button>
          <button class="btn btn-no" id="btnNo" onclick="growNo()">
            No 💔
          </button>
        </div>
      </div>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="page2">
      <div class="p2-header">
        <h1>My Letters to You ❤️</h1>
        <p>each one holds a little piece of my heart…</p>
      </div>
      <div class="folder-grid">
        <div class="folder" onclick="openLetter(0)">
          <div class="folder-tab"></div>
          <div class="folder-body">
            <div class="folder-label">💌 Letter 1</div>
            <div class="folder-hint">Kakene no</div>
          </div>
        </div>
        <div class="folder" onclick="openLetter(1)">
          <div class="folder-tab"></div>
          <div class="folder-body">
            <div class="folder-label">🌹 Letter 2</div>
            <div class="folder-hint">My strong girl..</div>
          </div>
        </div>
        <div class="folder" onclick="openLetter(2)">
          <div class="folder-tab"></div>
          <div class="folder-body">
            <div class="folder-label">🎀 Letter 3</div>
            <div class="folder-hint">I always love you so much…</div>
          </div>
        </div>
      </div>
      <div class="home-bar">
        <button class="btn btn-yes" onclick="goToPage1()">🏠 Home</button>
      </div>
    </div>

    <!-- LETTER MODAL -->
    <div class="overlay" id="overlay" onclick="closeModal(event)">
      <div class="letter-modal" id="letterModal">
        <button class="modal-close" onclick="closeLetterModal()">✕</button>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-divider">· · · ❤ · · ·</div>
        <div class="img-grid" id="imgGrid"></div>
        <div class="msg-area" id="msgArea"></div>
        <div class="stamp-row">🌷 💌 🕊️</div>
        <div style="text-align: center; margin-top: 1.6rem">
          <button
            class="btn btn-yes"
            onclick="
              closeLetterModal();
              goToPage1();
            "
          >
            🏠 Home
          </button>
        </div>
      </div>
    </div>

    <script>
      /* ── HEARTS ── */
      const canvas = document.getElementById("heartCanvas");
      const ctx = canvas.getContext("2d");
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);
      const COLORS = [
        "#f9a8c9",
        "#f472b6",
        "#ffc2d9",
        "#ff80b5",
        "#ffe4ef",
        "#e0608a",
      ];
      const hearts = [];
      function randBetween(a, b) {
        return a + Math.random() * (b - a);
      }
      function spawnHeart() {
        hearts.push({
          x: randBetween(0, canvas.width),
          y: canvas.height + 20,
          size: randBetween(14, 36),
          speed: randBetween(0.4, 1.2),
          drift: randBetween(-0.5, 0.5),
          alpha: randBetween(0.35, 0.8),
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: randBetween(0.02, 0.06),
        });
      }
      function drawHeart(cx, cy, size, color, alpha) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath();
        const s = size / 30;
        ctx.translate(cx, cy);
        ctx.scale(s, s);
        ctx.moveTo(0, -10);
        ctx.bezierCurveTo(-15, -25, -30, -10, 0, 10);
        ctx.bezierCurveTo(30, -10, 15, -25, 0, -10);
        ctx.fill();
        ctx.restore();
      }
      let frame = 0;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (frame % 45 === 0) spawnHeart();
        frame++;
        for (let i = hearts.length - 1; i >= 0; i--) {
          const h = hearts[i];
          h.y -= h.speed;
          h.wobble += h.wobbleSpeed;
          h.x += Math.sin(h.wobble) * 0.6 + h.drift;
          h.alpha -= 0.0008;
          if (h.y < -40 || h.alpha <= 0) {
            hearts.splice(i, 1);
            continue;
          }
          drawHeart(h.x, h.y, h.size, h.color, h.alpha);
        }
        requestAnimationFrame(animate);
      }
      animate();

      /* ── NO BUTTON ── */
      let noClickCount = 0;
      const noMessages = [
        "No 💔",
        "Are you sure? 🥺",
        "Really sure?? 😢",
        "Please reconsider… 🌸",
        "Think again! 💕",
        "Last chance! 💖",
        "Come onnn 🥹",
        "I believe in you! 💗",
        "You know you want to 🌷",
        "Just say yes! ❤️",
      ];
      function growNo() {
        noClickCount++;
        const btn = document.getElementById("btnNo");
        const step = Math.min(noClickCount, 9);
        btn.style.fontSize = `${1.25 + step * 0.2}rem`;
        btn.style.padding = `${0.75 + step * 0.1}rem ${2.2 + step * 0.15}rem`;
        btn.style.boxShadow = `0 ${4 + step * 3}px ${20 + step * 8}px rgba(224,96,138,${0.1 + step * 0.05})`;
        btn.textContent =
          noMessages[Math.min(noClickCount, noMessages.length - 1)];
        const yes = document.getElementById("btnYes");
        yes.style.animation = "none";
        setTimeout(() => {
          yes.style.animation = "yesShake .4s ease";
        }, 10);
      }

      /* ── NAVIGATION ── */
      function goToPage2() {
        document.getElementById("page1").classList.remove("active");
        document.getElementById("page2").classList.add("active");
        window.scrollTo(0, 0);
      }
      function goToPage1() {
        closeLetterModal();
        document.getElementById("page2").classList.remove("active");
        document.getElementById("page1").classList.add("active");
        window.scrollTo(0, 0);
      }

      /* ══════════════════════════════════════════════════════
         ✏️  YOUR LETTERS — edit image URLs and messages below
         HOW TO GET IMAGE URLs:
           1. Go to https://imgbb.com  (free, no account needed)
           2. Upload your photo → click "embed codes" → copy "Direct link"
           3. Paste that link below replacing the placeholder URL
      ══════════════════════════════════════════════════════ */
      const letters = [
        {
          title: "Letter 1 💌",
          image: "photos/IMG_1229.JPG", // ← paste your imgbb direct link here
          message: `My dear bompi,\n\nBaby, You're the most beautiful girl who I ever saw in my eyes. Remember, try to see and love yourself from the eyes of santhosh pandi. Then, you will get to know how beautiful bompi bui is.. You're the most strongest girl who I know.\n\nForever your otha 🌸`,
        },
        {
          title: "Letter 2 🌹",
          image: "photos/IMG_1338.jpg", // ← paste your imgbb direct link here
          message: `Dear Chotti bachi,\n\nI know, you're so confused about your future but remember, I am always besides you no matter what. Whether you have a job now or not, I will stand with you and hold your hands tightly always. I am not going to leave you that easily baby girl.\n\nWith all my love 💕`,
        },
        {
          title: "Letter 3 🎀",
          image: "photos/IMG_1394.jpg", // ← paste your imgbb direct link here
          message: `Dear sappa mukki,\n\nYou reached the final letter, right baby? I know, you're smiling now. It's so beautiful baby. You know I am so selfish. I want to see you in this smiling face always in this life time. You don't have to carry everything in your heart. It's okay baby. I am here. Let me share your happiness, sadness, angryness and everything. Let's push each other to our best. I always love you sooo much.. My unga pacha..\n\nAlways and forever 🌷`,
        },
      ];

      function openLetter(idx) {
        const l = letters[idx];
        document.getElementById("modalTitle").textContent = l.title;
        const grid = document.getElementById("imgGrid");
        grid.innerHTML = "";
        const slot = document.createElement("div");
        slot.className = "img-placeholder";
        slot.innerHTML = `<img class="preview" src="${l.image}" alt="our memory" onerror="this.parentElement.innerHTML='<span class=\\'icon\\'>📷</span><span>Image not found</span>'">`;
        grid.appendChild(slot);
        document.getElementById("msgArea").textContent = l.message;
        document.getElementById("overlay").classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeModal(e) {
        if (e.target === document.getElementById("overlay")) closeLetterModal();
      }
      function closeLetterModal() {
        document.getElementById("overlay").classList.remove("open");
        document.body.style.overflow = "";
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLetterModal();
      });
    </script>
  </body>
</html>
